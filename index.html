<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Aim Assist Trainer PWA - Gringozin FF</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#8e2de2">
    <style>
        /* Configurações Gerais */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0d0d15;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Container Principal */
        .card {
            background: #12121e;
            border: 2px solid #8e2de2;
            border-radius: 20px;
            padding: 30px;
            width: 320px;
            box-shadow: 0 0 20px rgba(142, 45, 226, 0.3);
            text-align: center;
        }

        /* Tela de Login */
        h2 { margin-bottom: 25px; font-weight: 600; }
        
        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            background: #1c1c2d;
            border: 1px solid #3f3f5a;
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
            outline: none;
        }

        .btn-principal {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(90deg, #8e2de2, #f00b51);
            color: white;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-principal:hover {
            opacity: 0.9;
            box-shadow: 0 0 15px rgba(240, 11, 81, 0.5);
        }

        .footer-links {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            font-size: 12px;
            color: #a0a0c0;
        }

        /* Tela de Funções (Escondida inicialmente) */
        #tela-funcoes { display: none; }

        .status-engine {
            color: #00ff88;
            font-size: 14px;
            margin-bottom: 20px;
        }

        /* Canvas overlay */
        canvas {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            z-index: 9999;
            pointer-events: auto;
        }

        .item-funcao {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #181829;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            text-align: left;
        }

        .info-texto b { display: block; font-size: 14px; color: #ff2d75; }
        .info-texto span { font-size: 11px; color: #888; }

        /* Switch Customizado */
        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 20px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #333;
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 14px; width: 14px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider { background-color: #f00b51; }
        input:checked + .slider:before { transform: translateX(20px); }

    </style>
</head>
<body>

    <div id="tela-login" class="card">
        <h2>Digite sua Key</h2>
        <input type="text" placeholder="Key" id="input-key">
        <button class="btn-principal" onclick="entrar()">Entrar</button>
        <div class="footer-links">
            <span>GRINGOZIN FF</span>
            <span>Admin</span>
        </div>
    </div>

    <div id="tela-funcoes" class="card">
        <div class="status-engine">● Engine: Carregando...</div>
        
        <div class="item-funcao">
            <div class="info-texto">
                <b>Controle de Recuo</b>
                <span>Reduz o recuo da arma</span>
            </div>
            <label class="switch">
                <input type="checkbox">
                <span class="slider"></span>
            </label>
        </div>

        <div class="item-funcao">
            <div class="info-texto">
                <b>Ajuste de Sensibilidade</b>
                <span>Otimiza a sensibilidade</span>
            </div>
            <label class="switch">
                <input type="checkbox" checked>
                <span class="slider"></span>
            </label>
        </div>

        <div class="item-funcao">
            <div class="info-texto">
                <b>Aim Assist</b>
                <span>Puxa mira pro alvo mais próximo</span>
            </div>
            <label class="switch">
                <input type="checkbox">
                <span class="slider"></span>
            </label>
        </div>

        <button class="btn-principal" style="margin-top: 20px;" onclick="toggleEngine()">INJETAR ENGINE</button>
        <div style="margin-top: 15px; font-size: 12px; color: #888;">
          ● Aim Assist + 4 Targets + FOV 150px + Bezier Sens<br>
          ● Touch otimizado Chrome/Android Samsung
        </div>
    </div>

    <script src="enginebundle.js"></script>
    <script>
        let injected = false;
        
        function updateStatus() {
            const statusEl = document.querySelector('.status-engine');
            if (!window.engine) {
                statusEl.textContent = '● Engine: Carregando...';
                statusEl.style.color = '#ffff00';
                return;
            }
            const isActive = !window.engine.isPaused;
            statusEl.textContent = `● Engine: ${isActive ? 'ATIVA 100%' : 'PAUSADA'} | ${window.engine.getStatus()}`;
            statusEl.style.color = isActive ? '#00ff88' : '#ff4444';
        }
        
        function waitForEngine() {
            if (window.engine) {
                wireToggles();
                updateStatus();
            } else {
                setTimeout(waitForEngine, 100);
            }
        }
        
        function wireToggles() {
            document.querySelectorAll('.switch input').forEach((sw, i) => {
                if (i === 1) sw.checked = window.engine.sensAdjust;
                else sw.checked = false;
                sw.addEventListener('change', e => {
                    if (!window.engine) return;
                    switch(i) {
                        case 0: window.engine.toggleRecoil(e.target.checked); break;
                        case 1: window.engine.toggleSens(e.target.checked); break;
                        case 2: window.engine.toggleAim(e.target.checked); break;
                    }
                    setTimeout(updateStatus, 50);
                });
            });
            updateStatus();
        }
        
        function entrar() {
            const key = document.getElementById('input-key').value;
            if(key !== "") {
                document.getElementById('tela-login').style.display = 'none';
                document.getElementById('tela-funcoes').style.display = 'block';
                waitForEngine();
            } else {
                alert("Digite uma Key!");
            }
        }
        
        function toggleEngine() {
            if (!window.engine) {
                alert('Aguarde engine carregar!');
                return;
            }
            window.engine.toggleVisibility();
            injected = !injected;
            setTimeout(updateStatus, 50);
        }
        
        // Live status update
        setInterval(updateStatus, 500);
        
        // Init
        waitForEngine();
    </script>
</body>
</html>
