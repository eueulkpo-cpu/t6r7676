<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="theme-color" content="#8e2de2">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <title>Gringozin FF - Painel</title>
    <style>
        /* Configurações Gerais */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0d0d15;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Container Principal */
        .card {
            background: #12121e;
            border: 2px solid #8e2de2;
            border-radius: 20px;
            padding: 30px;
            width: 320px;
            box-shadow: 0 0 20px rgba(142, 45, 226, 0.3);
            text-align: center;
        }

        /* Tela de Login */
        h2 { margin-bottom: 25px; font-weight: 600; }
        
        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            background: #1c1c2d;
            border: 1px solid #3f3f5a;
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
            outline: none;
        }

        .btn-principal {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(90deg, #8e2de2, #f00b51);
            color: white;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-principal:hover {
            opacity: 0.9;
            box-shadow: 0 0 15px rgba(240, 11, 81, 0.5);
        }

        .footer-links {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            font-size: 12px;
            color: #a0a0c0;
        }

        /* Tela de Funções (Escondida inicialmente) */
        #tela-funcoes { display: none; }

        .status-engine {
            color: #00ff88;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .item-funcao {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #181829;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            text-align: left;
        }

        .info-texto b { display: block; font-size: 14px; color: #ff2d75; }
        .info-texto span { font-size: 11px; color: #888; }

        /* Switch Customizado */
        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 20px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #333;
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 14px; width: 14px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider { background-color: #f00b51; }
        input:checked + .slider:before { transform: translateX(20px); }

        /* Canvas for aim preview */
        #aimCanvas {
            width: 100%;
            height: 300px;
            background: #000;
            border-radius: 10px;
            margin-bottom: 20px;
            touch-action: none;
        }

    </style>
</head>
<body>

    <div id="tela-login" class="card">
        <h2>Digite sua Key</h2>
        <input type="text" placeholder="Key" id="input-key">
        <button class="btn-principal" onclick="entrar()">Entrar</button>
        <div class="footer-links">
            <span>GRINGOZIN FF</span>
            <span>Admin</span>
        </div>
    </div>

    <div id="tela-funcoes" class="card">
        <div class="status-engine" id="status-engine">● Engine: 100% | Aim: OFF</div>
        
        <canvas id="aimCanvas"></canvas>
        
        <div class="item-funcao">
            <div class="info-texto">
                <b>Controle de Recuo</b>
                <span>Reduz o recuo da arma</span>
            </div>
            <label class="switch">
                <input type="checkbox">
                <span class="slider"></span>
            </label>
        </div>

        <div class="item-funcao">
            <div class="info-texto">
                <b>Ajuste de Sensibilidade</b>
                <span>Otimiza a sensibilidade</span>
            </div>
            <label class="switch">
                <input type="checkbox">
                <span class="slider"></span>
            </label>
        </div>

        <div class="item-funcao">
            <div class="info-texto">
                <b>Estabilidade de Mira</b>
                <span>Estabiliza a mira</span>
            </div>
            <label class="switch">
                <input type="checkbox">
                <span class="slider"></span>
            </label>
        </div>

        <button class="btn-principal" style="margin-top: 20px;">INJETAR</button>
    </div>

    <script>
        let aimEngine = null;
        let useBundle = false;

        // Register SW
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('SW registered', reg))
                .catch(err => console.log('SW failed', err));
        }

        function entrar() {
            const key = document.getElementById('input-key').value;
            if(key !== "") {
                document.getElementById('tela-login').style.display = 'none';
                document.getElementById('tela-funcoes').style.display = 'block';
                
                // Load engine
                const script = document.createElement('script');
                script.src = 'JS/engine.js';
                script.onload = initToggles;
                document.head.appendChild(script);
            } else {
                alert("Por favor, digite uma Key!");
            }
        }

        function initToggles() {
            const switches = document.querySelectorAll('#tela-funcoes .switch input');
            const sensSwitch = switches[1]; // Ajuste de Sensibilidade
            const miraSwitch = switches[2]; // Estabilidade de Mira
            
            sensSwitch.addEventListener('change', (e) => {
                if (!aimEngine) {
                    try {
                        aimEngine = window.initEngine('aimCanvas');
                    } catch (err) {
                        console.error('Engine init failed', err);
                        return;
                    }
                }
                if (e.target.checked) {
                    aimEngine.enable();
                    document.getElementById('status-engine').textContent = '● Engine: 100% | Aim: ON (Bezier)';
                } else {
                    aimEngine.disable();
                    document.getElementById('status-engine').textContent = '● Engine: 100% | Aim: OFF';
                }
            });

            miraSwitch.addEventListener('change', (e) => {
                if (aimEngine) {
                    aimEngine.setMode(e.target.checked ? 'linear' : 'bezier');
                    document.getElementById('status-engine').textContent += e.target.checked ? ' (Linear)' : ' (Bezier)';
                }
            });

            // INJETAR - Use bundle + SW sync
            const injetarBtn = document.querySelector('#tela-funcoes .btn-principal');
            injetarBtn.textContent = 'INJETAR BUNDLE';
            injetarBtn.onclick = () => {
                useBundle = true;
                // Load bundle for prod
                const bundleScript = document.createElement('script');
                bundleScript.src = 'JS/enginebundle.js';
                document.head.appendChild(bundleScript);
                if (aimEngine) {
                    // Send sample frame to SW
                    navigator.serviceWorker.controller.postMessage({
                        type: 'TOUCH_FRAME',
                        velocity: aimEngine.getStatus().velocity
                    });
                    alert('Bundle injetado! Frames sincronizados.');
                }
            };
        }

        // SW message listener for sync
        navigator.serviceWorker.addEventListener('message', (e) => {
            if (e.data.type === 'SYNC_VELOCITY') {
                console.log('SW synced velocity:', e.data.data);
                if (aimEngine) aimEngine.velocities = e.data.data;
            }
        });
    </script>
</body>
</html>
